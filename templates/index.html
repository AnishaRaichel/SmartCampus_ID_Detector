<!DOCTYPE html>
<html>
<head>
    <title>SmartCampus ID Detector</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background-color: #f5f5f5;
            margin-top: 40px;
        }
        h2 {
            color: #333;
        }
        form {
            margin: 20px;
        }
        input[type=file] {
            padding: 10px;
        }
        input[type=submit] {
            padding: 10px 20px;
            background-color: #ff8c00;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        input[type=submit]:hover {
            background-color: #e67600;
        }
        img {
            margin-top: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px #aaa;
            max-width: 90%;
        }
        .result {
            font-size: 20px;
            margin-top: 20px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <h2>Upload Group Image for ID Card Detection</h2>

    <form method="POST" enctype="multipart/form-data">
        <input type="file" name="file" accept="image/*" required>
        <input type="submit" value="Upload & Detect">
    </form>

    {% if result %}
        <div class="result">{{ result }}</div>
    {% endif %}

    {% if output_image %}
        <img src="{{ url_for('static', filename='output/' + output_image) }}">
    {% endif %}

</body>
</html>
